<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Iconia Clock</title>
  <meta name="theme-color" content="#030508">

  <style>
    * { margin:0; padding:0; -webkit-box-sizing:border-box; box-sizing:border-box; }

    html, body {
      width:100%;
      height:100%;
      overflow:hidden;
      background:#030508;
      font-family:Arial, sans-serif;
      -webkit-user-select:none;
      user-select:none;
    }

    body.day { background:#091018; }
    body.night { background:#030508; }

    #app {
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
    }

    /* Franja superior "muerta" para compensar la UI del navegador */
    #top-dead-zone {
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:12vh;
      z-index:1;
      pointer-events:none;
    }

    .floating {
      position:absolute;
      white-space:nowrap;
      -webkit-transition:left 2s ease, top 2s ease, opacity 1s ease, color 1s ease;
      transition:left 2s ease, top 2s ease, opacity 1s ease, color 1s ease;
      -webkit-transform:translate(-50%,-50%);
      transform:translate(-50%,-50%);
    }

    #clock-group {
      z-index:3;
      text-align:center;
      max-width:92vw;
    }

    #time {
      font-family:monospace;
      font-weight:bold;
      font-size:18vw;
      line-height:0.9;
      letter-spacing:-2px;
    }

    #seconds {
      margin-top:4px;
      text-align:right;
      font-family:monospace;
      font-weight:bold;
      font-size:18px;
      letter-spacing:2px;
      opacity:0.7;
    }

    #date-text {
      margin-top:8px;
      font-family:monospace;
      font-weight:bold;
      font-size:18px;
      line-height:1.2;
      text-align:center;
      white-space:nowrap;
    }

    #temp-wrap {
      z-index:2;
      text-align:center;
    }

    #temp-value {
      font-family:monospace;
      font-weight:bold;
      font-size:40px;
      line-height:1;
    }

    #temp-label {
      margin-top:4px;
      font-size:11px;
      letter-spacing:2px;
      opacity:0.75;
    }

    body.day #time,
    body.day #date-text,
    body.day #temp-value {
      color:#6EB7DA;
    }

    body.day #seconds,
    body.day #temp-label {
      color:#426E88;
    }

    body.night #time,
    body.night #date-text,
    body.night #temp-value {
      color:#2C5673;
    }

    body.night #seconds,
    body.night #temp-label {
      color:#1B3444;
    }

    .rest-mode #time,
    .rest-mode #date-text,
    .rest-mode #temp-value {
      opacity:0.78;
    }

    .rest-mode #seconds,
    .rest-mode #temp-label {
      opacity:0.38;
    }

    @media screen and (max-width: 700px) {
      #time { font-size:19vw; }
      #date-text { font-size:16px; }
      #temp-value { font-size:38px; }
      #seconds { font-size:16px; }
    }
  </style>
</head>
<body class="night">
  <div id="app">
    <div id="top-dead-zone"></div>

    <div class="floating" id="clock-group">
      <div id="time">00:00</div>
      <div id="seconds">00</div>
      <div id="date-text">Sábado, 18 de abril de 2026</div>
    </div>

    <div class="floating" id="temp-wrap">
      <div id="temp-value">--°</div>
      <div id="temp-label">PUEBLA</div>
    </div>
  </div>

  <script>
    var LAT = 19.0414;
    var LON = -98.2063;

    var DIAS = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    var MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

    function pad(n) {
      return n < 10 ? '0' + n : '' + n;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function setMode() {
      var h = new Date().getHours();
      document.body.className = (h >= 20 || h < 7) ? 'night' : 'day';
      if (h >= 1 && h < 6) {
        document.body.className += ' rest-mode';
      }
    }

    function updateClock() {
      var now = new Date();
      document.getElementById('time').innerHTML = pad(now.getHours()) + ':' + pad(now.getMinutes());
      document.getElementById('seconds').innerHTML = pad(now.getSeconds());
    }

    function updateDate() {
      var now = new Date();
      var texto = DIAS[now.getDay()] + ', ' + now.getDate() + ' de ' + MESES[now.getMonth()] + ' de ' + now.getFullYear();
      document.getElementById('date-text').innerHTML = texto;
    }

    function loadWeather() {
      var url = 'https://api.open-meteo.com/v1/forecast' +
        '?latitude=' + LAT +
        '&longitude=' + LON +
        '&current=temperature_2m' +
        '&timezone=America%2FMexico_City' +
        '&forecast_days=1';

      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);

      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;
        if (xhr.status !== 200) return;

        try {
          var data = JSON.parse(xhr.responseText);
          document.getElementById('temp-value').innerHTML =
            Math.round(data.current.temperature_2m) + '°';
        } catch (e) {}
      };

      xhr.send();
    }

    /* Zonas más bajas para compensar la barra del navegador */
    var clockZones = [
      { cx:50, cy:36 },
      { cx:50, cy:44 },
      { cx:50, cy:52 },
      { cx:50, cy:60 },
      { cx:42, cy:40 },
      { cx:58, cy:40 },
      { cx:42, cy:52 },
      { cx:58, cy:52 },
      { cx:42, cy:62 },
      { cx:58, cy:62 }
    ];

    /* Temperatura fuera del centro */
    var tempZones = [
      { cx:16, cy:22 },
      { cx:84, cy:22 },
      { cx:14, cy:50 },
      { cx:86, cy:50 },
      { cx:16, cy:78 },
      { cx:84, cy:78 },
      { cx:22, cy:88 },
      { cx:78, cy:88 }
    ];

    var lastClockZone = -1;
    var lastTempZone = -1;

    function getRandomIndex(length, exclude) {
      var idx = randomInt(0, length - 1);
      while (length > 1 && idx === exclude) {
        idx = randomInt(0, length - 1);
      }
      return idx;
    }

    function place(el, cx, cy) {
      el.style.left = cx + '%';
      el.style.top = cy + '%';
    }

    function overlap(a, b, padding) {
      return !(
        a.right + padding < b.left ||
        a.left > b.right + padding ||
        a.bottom + padding < b.top ||
        a.top > b.bottom + padding
      );
    }

    function inside(rect, marginX, marginTop, marginBottom) {
      var vw = window.innerWidth;
      var vh = window.innerHeight;
      return rect.left >= marginX &&
             rect.right <= (vw - marginX) &&
             rect.top >= marginTop &&
             rect.bottom <= (vh - marginBottom);
    }

    function moveWidgets() {
      var clock = document.getElementById('clock-group');
      var temp = document.getElementById('temp-wrap');
      var tries = 0;
      var ok = false;

      while (tries < 40 && !ok) {
        var zc = getRandomIndex(clockZones.length, lastClockZone);
        var zt = getRandomIndex(tempZones.length, lastTempZone);

        var c = clockZones[zc];
        var t = tempZones[zt];

        place(clock, c.cx + randomInt(-2, 2), c.cy + randomInt(-2, 2));
        place(temp, t.cx + randomInt(-2, 2), t.cy + randomInt(-2, 2));

        var rc = clock.getBoundingClientRect();
        var rt = temp.getBoundingClientRect();

        if (
          inside(rc, 14, 56, 10) &&
          inside(rt, 12, 42, 8) &&
          !overlap(rc, rt, 22)
        ) {
          lastClockZone = zc;
          lastTempZone = zt;
          ok = true;
        }

        tries++;
      }

      if (!ok) {
        place(clock, 50, 54);
        place(temp, 84, 22);
      }
    }

    function scheduleMove() {
      var nextMs = randomInt(120000, 240000);
      setTimeout(function() {
        moveWidgets();
        scheduleMove();
      }, nextMs);
    }

    setMode();
    updateClock();
    updateDate();
    loadWeather();
    moveWidgets();

    setInterval(setMode, 30000);
    setInterval(updateClock, 1000);
    setInterval(updateDate, 60000);
    setInterval(loadWeather, 600000);

    setInterval(function() {
      var clock = document.getElementById('clock-group');
      var temp = document.getElementById('temp-wrap');
      clock.style.marginLeft = randomInt(-1, 1) + 'px';
      clock.style.marginTop = randomInt(-1, 1) + 'px';
      temp.style.marginLeft = randomInt(-1, 1) + 'px';
      temp.style.marginTop = randomInt(-1, 1) + 'px';
    }, 45000);

    scheduleMove();
  </script>
</body>
</html>
