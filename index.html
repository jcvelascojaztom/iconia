<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Iconia Clock Vertical</title>
  <meta name="theme-color" content="#05090d">

  <style>
    * {
      margin: 0;
      padding: 0;
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05090d;
      font-family: Arial, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      color: #ffffff;
      -webkit-transition: background-color 2.5s ease;
      transition: background-color 2.5s ease;
    }

    /* Fondos oscuros por momento del día */
    body.morning { background: #0a1822; }
    body.day { background: #0c202c; }
    body.evening { background: #08141d; }
    body.night { background: #05090d; }
    body.rest-mode { background: #020508; }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      padding: 5vh 7vw 4vh;
      text-align: center;
      -webkit-transition: -webkit-transform 1.6s ease;
      transition: -webkit-transform 1.6s ease;
      transition: transform 1.6s ease;
      transition: transform 1.6s ease, -webkit-transform 1.6s ease;
      will-change: transform;
    }

    .soft-color {
      -webkit-animation: softColor 18s ease-in-out infinite alternate;
      animation: softColor 18s ease-in-out infinite alternate;
    }

    @-webkit-keyframes softColor {
      0% { color: #ffffff; }
      45% { color: #edf7ff; }
      100% { color: #cfefff; }
    }

    @keyframes softColor {
      0% { color: #ffffff; }
      45% { color: #edf7ff; }
      100% { color: #cfefff; }
    }

    #clock-panel {
      width: 100%;
      margin-top: 1vh;
    }

    #time-row {
      width: 100%;
      text-align: center;
      white-space: nowrap;
    }

    #period-icon {
      display: inline-block;
      vertical-align: top;
      font-family: Arial, sans-serif;
      font-size: 8vw;
      margin-top: 2vh;
      margin-right: 1vw;
      opacity: 0.95;
      text-shadow: 0 0 18px rgba(255,255,255,0.08);
    }

    #time {
      display: inline-block;
      vertical-align: top;
      font-family: monospace;
      font-weight: bold;
      font-size: 23vw;
      line-height: 0.85;
      letter-spacing: -0.08em;
      white-space: nowrap;
      text-shadow: 0 0 20px rgba(255,255,255,0.08);
    }

    #ampm {
      display: inline-block;
      vertical-align: top;
      font-family: monospace;
      font-weight: bold;
      font-size: 5vw;
      line-height: 1;
      margin-top: 2.5vh;
      margin-left: 1vw;
      letter-spacing: 0.04em;
      opacity: 0.92;
    }

    #seconds {
      margin-top: 1vh;
      font-family: monospace;
      font-weight: bold;
      font-size: 4.8vw;
      letter-spacing: 0.22em;
      opacity: 0.75;
    }

    #date-block {
      margin-top: 5vh;
      width: 100%;
    }

    #weekday {
      font-family: monospace;
      font-weight: bold;
      font-size: 8vw;
      line-height: 1.05;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    #date-text {
      margin-top: 1.5vh;
      font-family: monospace;
      font-weight: bold;
      font-size: 6vw;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }

    #weather-card {
      position: absolute;
      left: 7vw;
      right: 7vw;
      bottom: 4vh;
      text-align: left;
    }

    .weather-line {
      margin-bottom: 1.4vh;
      font-family: monospace;
      font-weight: bold;
      font-size: 5.4vw;
      line-height: 1.08;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .weather-icon {
      display: inline-block;
      width: 1.7em;
      min-width: 1.7em;
      font-family: Arial, sans-serif;
      font-weight: normal;
      text-align: center;
      letter-spacing: 0;
    }

    #weather-updated {
      margin-top: 1.6vh;
      text-align: center;
      font-family: monospace;
      font-weight: bold;
      font-size: 2.8vw;
      letter-spacing: 0.10em;
      opacity: 0.48;
    }

    .primary { color: #ffffff; }
    .secondary { color: rgba(255,255,255,0.90); }
    .muted { color: rgba(255,255,255,0.76); }

    body.rest-mode .primary,
    body.rest-mode .secondary,
    body.rest-mode .muted {
      opacity: 0.72;
    }

    body.rest-mode #weather-updated,
    body.rest-mode #seconds {
      opacity: 0.35;
    }

    @media screen and (orientation: landscape) {
      #app {
        padding: 4vh 6vw 3vh;
      }

      #time { font-size: 16vw; }
      #weekday { font-size: 5vw; }
      #date-text { font-size: 4vw; }
      .weather-line { font-size: 3.6vw; }
      #weather-updated { font-size: 2vw; }
    }

    @media screen and (max-height: 720px) {
      #app {
        padding-top: 4vh;
        padding-bottom: 3vh;
      }

      #date-block {
        margin-top: 3.2vh;
      }

      .weather-line {
        margin-bottom: 1vh;
      }
    }

    @media screen and (prefers-reduced-motion: reduce) {
      .soft-color {
        -webkit-animation: none;
        animation: none;
      }

      body,
      #app {
        -webkit-transition: none;
        transition: none;
      }
    }
  </style>
</head>
<body class="night">
  <div id="app">
    <section id="clock-panel" aria-label="Hora actual">
      <div id="time-row">
        <span id="period-icon" class="soft-color" aria-hidden="true">☾</span>
        <span id="time" class="primary soft-color">12:00</span>
        <span id="ampm" class="secondary soft-color">AM</span>
      </div>

      <div id="seconds" class="muted">00</div>

      <div id="date-block">
        <div id="weekday" class="primary soft-color">LUNES</div>
        <div id="date-text" class="secondary soft-color">27 DE ABRIL 2026</div>
      </div>
    </section>

    <section id="weather-card" aria-label="Clima actual en Puebla">
      <div class="weather-line secondary">
        <span class="weather-icon" id="weather-icon" aria-hidden="true">☀</span>
        <span>CLIMA: <span id="weather-desc">--</span> <span id="temp-value">--°C</span></span>
      </div>

      <div class="weather-line secondary">
        <span class="weather-icon" id="precip-icon" aria-hidden="true">○</span>
        <span>PRECIPITACIÓN: <span id="precip-value">--%</span></span>
      </div>

      <div class="weather-line secondary">
        <span class="weather-icon" id="humidity-icon" aria-hidden="true">💧</span>
        <span>HUMEDAD: <span id="humidity-value">--%</span></span>
      </div>

      <div class="weather-line secondary">
        <span class="weather-icon" id="wind-icon" aria-hidden="true">〰</span>
        <span>VIENTO: <span id="wind-value">-- KM/H</span></span>
      </div>

      <div id="weather-updated">PUEBLA · ACTUALIZANDO</div>
    </section>
  </div>

  <script>
    var LAT = 19.0414;
    var LON = -98.2063;
    var TZ = 'America%2FMexico_City';

    var DIAS = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    var MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

    var shiftPoints = [
      { x: 0, y: 0 },
      { x: 3, y: 0 },
      { x: -3, y: 0 },
      { x: 0, y: 3 },
      { x: 0, y: -3 },
      { x: 3, y: 3 },
      { x: -3, y: 3 },
      { x: 3, y: -3 },
      { x: -3, y: -3 }
    ];
    var lastShiftIndex = 0;

    function el(id) {
      return document.getElementById(id);
    }

    function pad(n) {
      return n < 10 ? '0' + n : '' + n;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function to12Hour(h) {
      var v = h % 12;
      return v === 0 ? 12 : v;
    }

    function getDayPeriod(hour) {
      if (hour >= 5 && hour < 12) {
        return { cls: 'morning', icon: '🌅' };
      }
      if (hour >= 12 && hour < 18) {
        return { cls: 'day', icon: '☀' };
      }
      if (hour >= 18 && hour < 21) {
        return { cls: 'evening', icon: '🌆' };
      }
      return { cls: 'night', icon: '🌙' };
    }

    function setMode(now) {
      var hour = now.getHours();
      var period = getDayPeriod(hour);

      document.body.className = period.cls;
      if (hour >= 1 && hour < 6) {
        document.body.className += ' rest-mode';
      }

      el('period-icon').innerHTML = period.icon;
    }

    function updateClock() {
      var now = new Date();
      var h = now.getHours();

      el('time').innerHTML = pad(to12Hour(h)) + ':' + pad(now.getMinutes());
      el('ampm').innerHTML = h >= 12 ? 'PM' : 'AM';
      el('seconds').innerHTML = pad(now.getSeconds());

      setMode(now);
    }

    function updateDate() {
      var now = new Date();
      el('weekday').innerHTML = DIAS[now.getDay()].toUpperCase();
      el('date-text').innerHTML = now.getDate() + ' DE ' + MESES[now.getMonth()].toUpperCase() + ' ' + now.getFullYear();
    }

    function weatherCodeInfo(code, isDay) {
      var map = {
        0: ['SOLEADO', isDay ? '☀️' : '🌙'],
        1: ['MAYORMENTE DESPEJADO', isDay ? '🌤️' : '🌙'],
        2: ['PARCIALMENTE NUBLADO', '⛅'],
        3: ['NUBLADO', '☁️'],
        45: ['NIEBLA', '🌫️'],
        48: ['NIEBLA DENSA', '🌫️'],
        51: ['LLOVIZNA LIGERA', '🌦️'],
        53: ['LLOVIZNA', '🌦️'],
        55: ['LLOVIZNA INTENSA', '🌧️'],
        56: ['LLOVIZNA HELADA', '🌧️'],
        57: ['LLOVIZNA HELADA', '🌧️'],
        61: ['LLUVIA LIGERA', '🌧️'],
        63: ['LLUVIA', '🌧️'],
        65: ['LLUVIA FUERTE', '⛈️'],
        66: ['LLUVIA HELADA', '🌧️'],
        67: ['LLUVIA HELADA FUERTE', '⛈️'],
        71: ['NIEVE LIGERA', '🌨️'],
        73: ['NIEVE', '🌨️'],
        75: ['NIEVE INTENSA', '❄️'],
        77: ['GRANIZO', '🌨️'],
        80: ['CHUBASCOS', '🌦️'],
        81: ['CHUBASCOS FUERTES', '🌧️'],
        82: ['AGUACERO', '⛈️'],
        85: ['NEVADAS', '🌨️'],
        86: ['NEVADAS FUERTES', '❄️'],
        95: ['TORMENTA', '⛈️'],
        96: ['TORMENTA CON GRANIZO', '⛈️'],
        99: ['TORMENTA FUERTE', '⛈️']
      };

      if (map[code]) return map[code];
      return ['CLIMA', isDay ? '☀️' : '🌙'];
    }

    function getPrecipIcon(prob) {
      if (prob < 10) return '○';
      if (prob < 40) return '☂️';
      return '☔';
    }

    function getHumidityIcon(humidity) {
      if (humidity < 35) return '◔';
      if (humidity < 65) return '💧';
      return '💧💧';
    }

    function getWindIcon(wind) {
      if (wind < 10) return '〰';
      if (wind < 25) return '〰〰';
      return '〰〰〰';
    }

    function getCurrentHourIndex(hourlyTimes) {
      if (!hourlyTimes || !hourlyTimes.length) return new Date().getHours();

      var now = new Date();
      var target = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate()) + 'T' + pad(now.getHours()) + ':00';

      for (var i = 0; i < hourlyTimes.length; i++) {
        if (hourlyTimes[i] === target) return i;
      }

      return now.getHours();
    }

    function loadWeather() {
      var url = 'https://api.open-meteo.com/v1/forecast' +
        '?latitude=' + LAT +
        '&longitude=' + LON +
        '&current=temperature_2m,relative_humidity_2m,is_day,weather_code,wind_speed_10m' +
        '&hourly=precipitation_probability' +
        '&timezone=' + TZ +
        '&forecast_days=1';

      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);

      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;

        if (xhr.status !== 200) {
          el('weather-updated').innerHTML = 'PUEBLA · SIN CONEXIÓN';
          return;
        }

        try {
          var data = JSON.parse(xhr.responseText);
          var current = data.current || {};
          var hourly = data.hourly || {};
          var now = new Date();

          var temp = Math.round(current.temperature_2m || 0);
          var humidity = Math.round(current.relative_humidity_2m || 0);
          var wind = Math.round(current.wind_speed_10m || 0);
          var isDay = current.is_day === 1;
          var wcode = current.weather_code;
          var hourIndex = getCurrentHourIndex(hourly.time);

          var precip = 0;
          if (hourly.precipitation_probability && hourly.precipitation_probability.length > hourIndex) {
            precip = Math.round(hourly.precipitation_probability[hourIndex] || 0);
          }

          var info = weatherCodeInfo(wcode, isDay);

          el('weather-icon').innerHTML = info[1];
          el('weather-desc').innerHTML = info[0];
          el('temp-value').innerHTML = temp + '°C';

          el('precip-icon').innerHTML = getPrecipIcon(precip);
          el('precip-value').innerHTML = precip + '%';

          el('humidity-icon').innerHTML = getHumidityIcon(humidity);
          el('humidity-value').innerHTML = humidity + '%';

          el('wind-icon').innerHTML = getWindIcon(wind);
          el('wind-value').innerHTML = wind + ' KM/H';

          el('weather-updated').innerHTML = 'PUEBLA · ACTUALIZADO ' + pad(now.getHours()) + ':' + pad(now.getMinutes());
        } catch (e) {
          el('weather-updated').innerHTML = 'PUEBLA · ERROR DE CLIMA';
        }
      };

      xhr.send();
    }

    function microShift() {
      var idx = randomInt(0, shiftPoints.length - 1);
      while (shiftPoints.length > 1 && idx === lastShiftIndex) {
        idx = randomInt(0, shiftPoints.length - 1);
      }

      lastShiftIndex = idx;
      var p = shiftPoints[idx];
      el('app').style.webkitTransform = 'translate(' + p.x + 'px,' + p.y + 'px)';
      el('app').style.transform = 'translate(' + p.x + 'px,' + p.y + 'px)';
    }

    updateClock();
    updateDate();
    loadWeather();
    microShift();

    setInterval(updateClock, 1000);
    setInterval(updateDate, 60000);
    setInterval(loadWeather, 600000);
    setInterval(microShift, 180000);
  </script>
</body>
</html>
